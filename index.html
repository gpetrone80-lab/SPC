<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPC Fire Academy - Performance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .sidebar-link.active { background-color: #dc2626; color: white; }
        #pdf-render-zone { position: absolute; left: -9999px; top: 0; width: 800px; z-index: -1; background: white; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col md:flex-row">

    <aside class="w-64 bg-slate-900 text-white flex-shrink-0 h-screen sticky top-0 hidden md:flex flex-col border-r border-slate-800">
        <div class="p-6 border-b border-slate-800 flex items-center gap-3">
            <div class="bg-red-600 p-2 rounded-lg"><i class="fa-solid fa-fire-extinguisher text-white text-xl"></i></div>
            <div>
                <h1 class="font-black text-lg leading-none uppercase tracking-tighter">SPC FIRE</h1>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Candidate Tracking</p>
            </div>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="sidebar-link active w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-bold text-sm text-slate-400 hover:bg-slate-800 hover:text-white">
                <i class="fa-solid fa-chart-pie w-5"></i> Dashboard
            </button>
            <button onclick="switchTab('tracker')" id="nav-tracker" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-bold text-sm text-slate-400 hover:bg-slate-800 hover:text-white">
                <i class="fa-solid fa-clock-rotate-left w-5"></i> History Tracker
            </button>
            <button onclick="prepareNewEvaluation()" id="nav-evaluation" class="sidebar-link w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-bold text-sm text-slate-400 hover:bg-slate-800 hover:text-white">
                <i class="fa-solid fa-plus w-5"></i> New Evaluation
            </button>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700">
                <div class="flex justify-between items-center mb-1">
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Cloud Status</p>
                    <button onclick="location.reload()" class="text-[8px] text-red-500 hover:underline">Sync</button>
                </div>
                <div class="flex items-center gap-2">
                    <div id="sync-indicator" class="w-2 h-2 rounded-full bg-slate-500"></div>
                    <span id="sync-status" class="text-xs font-bold text-slate-300">Connecting...</span>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 p-6 lg:p-10 overflow-y-auto max-h-screen">
        <section id="tab-dashboard" class="tab-content active space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Total Candidates</p>
                    <h3 id="stat-total" class="text-4xl font-black text-slate-900">0</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Cloud Records</p>
                    <h3 id="stat-count" class="text-4xl font-black text-blue-600">0</h3>
                </div>
            </div>
            <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100 text-[10px] font-black text-slate-400 uppercase">
                        <tr><th class="px-6 py-4">Candidate</th><th class="px-6 py-4">Status</th><th class="px-6 py-4">Date</th></tr>
                    </thead>
                    <tbody id="dashboard-feed" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </section>

        <section id="tab-evaluation" class="tab-content space-y-8">
            <div class="bg-white rounded-3xl shadow-xl border-t-8 border-red-600 p-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" id="eval-name" placeholder="Candidate Name" class="p-3 bg-slate-50 border-2 rounded-xl outline-none font-bold">
                    <input type="text" id="eval-id" placeholder="Candidate ID" class="p-3 bg-slate-50 border-2 rounded-xl outline-none font-bold">
                </div>
                <button id="save-btn" onclick="saveEvaluation()" class="mt-6 bg-red-600 text-white px-12 py-4 rounded-2xl font-black uppercase shadow-xl hover:bg-red-700 w-full md:w-auto">
                    SAVE TO CLOUD
                </button>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAwP3P8uzX3ejnzI-fj9_Z9T8LUV0jWeZQ",
            authDomain: "fireacademy1-c8ef2.firebaseapp.com",
            projectId: "fireacademy1-c8ef2",
            storageBucket: "fireacademy1-c8ef2.firebasestorage.app",
            messagingSenderId: "1003289602251",
            appId: "1:1003289602251:web:0408ed247b5bb073e6d34e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const collectionPath = 'evaluations'; // Simplified path for reliability

        window.state = { evals: [], user: null };

        const setSyncStatus = (status, colorClass) => {
            const ind = document.getElementById('sync-indicator');
            const txt = document.getElementById('sync-status');
            if(ind) ind.className = `w-2 h-2 rounded-full ${colorClass}`;
            if(txt) txt.innerText = status;
        };

        onAuthStateChanged(auth, (user) => {
            window.state.user = user;
            if (user) {
                setSyncStatus("Online", "bg-green-500");
                setupDataListener();
            } else {
                signInAnonymously(auth).catch(e => setSyncStatus("Auth Error", "bg-red-500"));
            }
        });

        const setupDataListener = () => {
            onSnapshot(collection(db, collectionPath), (snap) => {
                window.state.evals = snap.docs.map(doc => ({ ...doc.data(), internalId: doc.id }));
                renderUI();
            }, (err) => {
                console.error("Firestore Error:", err.code, err.message);
                setSyncStatus("Sync Error", "bg-amber-500");
            });
        };

        window.saveEvaluation = async () => {
            const name = document.getElementById('eval-name').value;
            const id = document.getElementById('eval-id').value;
            if (!name || !id) return alert("Missing fields");

            const docId = 'rec_' + Date.now();
            try {
                await setDoc(doc(db, collectionPath, docId), {
                    name, id, date: new Date().toISOString().split('T')[0], updatedAt: new Date().toISOString()
                });
                alert("Saved successfully!");
            } catch (err) {
                alert("Error: " + err.message);
            }
        };

        const renderUI = () => {
            document.getElementById('stat-total').innerText = [...new Set(window.state.evals.map(e => e.id))].length;
            document.getElementById('stat-count').innerText = window.state.evals.length;
            const feed = document.getElementById('dashboard-feed');
            feed.innerHTML = window.state.evals.map(e => `
                <tr>
                    <td class="px-6 py-4"><b>${e.name}</b></td>
                    <td class="px-6 py-4">RECORDED</td>
                    <td class="px-6 py-4">${e.date}</td>
                </tr>
            `).join('');
        };

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${tab}`).classList.add('active');
        };

        window.prepareNewEvaluation = () => window.switchTab('evaluation');
    </script>
</body>
</html>
